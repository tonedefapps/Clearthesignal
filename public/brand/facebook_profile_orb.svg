<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="space" cx="40%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#1c1a38"/>
      <stop offset="55%" stop-color="#141228"/>
      <stop offset="100%" stop-color="#0a0812"/>
    </radialGradient>
    <!-- orb core -->
    <radialGradient id="orb" cx="38%" cy="34%" r="60%">
      <stop offset="0%"   stop-color="#f0e8e0" stop-opacity="1"/>
      <stop offset="18%"  stop-color="#e8c8a0" stop-opacity="1"/>
      <stop offset="42%"  stop-color="#d4845a" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#c4673a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b3a1a" stop-opacity="1"/>
    </radialGradient>
    <!-- outer glow layers -->
    <radialGradient id="halo1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c4673a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4673a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6b6fad" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6b6fad" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a8c4e0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a8c4e0" stop-opacity="0"/>
    </radialGradient>
    <!-- nebula wisps -->
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6b6fad" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6b6fad" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a8c4e0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a8c4e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur-xs">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- deep space background -->
  <rect width="512" height="512" fill="url(#space)"/>

  <!-- nebula cloud — upper left -->
  <ellipse cx="140" cy="155" rx="180" ry="110" fill="url(#neb1)" filter="url(#blur-soft)" opacity="0.7"/>
  <!-- nebula cloud — lower right -->
  <ellipse cx="380" cy="370" rx="150" ry="90" fill="url(#neb2)" filter="url(#blur-soft)" opacity="0.5"/>
  <!-- faint periwinkle wisp across center -->
  <ellipse cx="256" cy="256" rx="220" ry="80" fill="url(#neb1)" filter="url(#blur-soft)" opacity="0.3" transform="rotate(-18 256 256)"/>

  <!-- halo — widest, blue -->
  <circle cx="256" cy="256" r="175" fill="url(#halo3)" filter="url(#blur-soft)"/>
  <!-- halo — mid, periwinkle -->
  <circle cx="256" cy="256" r="135" fill="url(#halo2)" filter="url(#blur-soft)"/>
  <!-- halo — tight, warm -->
  <circle cx="256" cy="256" r="98" fill="url(#halo1)" filter="url(#blur-soft)"/>

  <!-- star field — dim noise -->
  <g opacity="1">
    <circle cx="38"  cy="28"  r="0.9" fill="#d4c4a8" opacity="0.20"/>
    <circle cx="84"  cy="71"  r="0.7" fill="#d4c4a8" opacity="0.16"/>
    <circle cx="162" cy="19"  r="1.0" fill="#d4c4a8" opacity="0.18"/>
    <circle cx="220" cy="55"  r="0.7" fill="#d4c4a8" opacity="0.14"/>
    <circle cx="310" cy="22"  r="0.9" fill="#d4c4a8" opacity="0.19"/>
    <circle cx="388" cy="48"  r="0.8" fill="#d4c4a8" opacity="0.15"/>
    <circle cx="448" cy="18"  r="1.0" fill="#d4c4a8" opacity="0.17"/>
    <circle cx="492" cy="64"  r="0.7" fill="#d4c4a8" opacity="0.13"/>
    <circle cx="28"  cy="140" r="0.8" fill="#d4c4a8" opacity="0.14"/>
    <circle cx="72"  cy="200" r="0.9" fill="#d4c4a8" opacity="0.16"/>
    <circle cx="20"  cy="310" r="0.8" fill="#d4c4a8" opacity="0.15"/>
    <circle cx="55"  cy="400" r="0.7" fill="#d4c4a8" opacity="0.13"/>
    <circle cx="30"  cy="470" r="1.0" fill="#d4c4a8" opacity="0.18"/>
    <circle cx="100" cy="490" r="0.8" fill="#d4c4a8" opacity="0.14"/>
    <circle cx="200" cy="480" r="0.9" fill="#d4c4a8" opacity="0.16"/>
    <circle cx="420" cy="470" r="0.8" fill="#d4c4a8" opacity="0.15"/>
    <circle cx="470" cy="495" r="0.9" fill="#d4c4a8" opacity="0.17"/>
    <circle cx="500" cy="440" r="0.7" fill="#d4c4a8" opacity="0.13"/>
    <circle cx="490" cy="310" r="0.9" fill="#d4c4a8" opacity="0.16"/>
    <circle cx="505" cy="200" r="0.8" fill="#d4c4a8" opacity="0.14"/>
    <circle cx="480" cy="140" r="1.0" fill="#d4c4a8" opacity="0.18"/>
    <circle cx="128" cy="440" r="0.8" fill="#d4c4a8" opacity="0.12"/>
    <circle cx="380" cy="490" r="0.7" fill="#d4c4a8" opacity="0.13"/>
  </g>

  <!-- brighter desert sky accent stars -->
  <g filter="url(#star-glow)">
    <circle cx="88"  cy="112" r="1.6" fill="#a8c4e0" opacity="0.75"/>
    <circle cx="44"  cy="360" r="1.4" fill="#a8c4e0" opacity="0.65"/>
    <circle cx="430" cy="88"  r="1.5" fill="#a8c4e0" opacity="0.70"/>
    <circle cx="468" cy="390" r="1.6" fill="#a8c4e0" opacity="0.68"/>
    <circle cx="148" cy="488" r="1.4" fill="#a8c4e0" opacity="0.60"/>
    <circle cx="372" cy="460" r="1.5" fill="#a8c4e0" opacity="0.62"/>
    <circle cx="500" cy="155" r="1.3" fill="#a8c4e0" opacity="0.58"/>
    <circle cx="22"  cy="228" r="1.4" fill="#a8c4e0" opacity="0.64"/>
  </g>

  <!-- red rock bright star — upper right constellation anchor -->
  <circle cx="398" cy="96"  r="2.0" fill="#c4673a" opacity="0.80" filter="url(#star-glow)"/>
  <circle cx="128" cy="78"  r="1.5" fill="#c4673a" opacity="0.60" filter="url(#star-glow)"/>
  <circle cx="60"  cy="432" r="1.8" fill="#c4673a" opacity="0.55" filter="url(#star-glow)"/>

  <!-- orb shadow rim (dark edge) -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#0a0812" stroke-width="8" opacity="0.55"/>

  <!-- orb body -->
  <circle cx="256" cy="256" r="70" fill="url(#orb)"/>

  <!-- orb surface shimmer — subtle lighter arc top-left -->
  <ellipse cx="236" cy="234" rx="28" ry="20" fill="white" opacity="0.07" transform="rotate(-30 236 234)"/>

  <!-- orb thin atmosphere ring -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#d4845a" stroke-width="1.5" opacity="0.20"/>
  <circle cx="256" cy="256" r="73" fill="none" stroke="#a8c4e0" stroke-width="0.8" opacity="0.12"/>
</svg>
