name: Daily Content Curation

on:
  schedule:
    - cron: '0 8 */3 * *'  # 8am UTC every 3 days
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: read
  id-token: write           # Required for Workload Identity Federation

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/147611536438/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'firebase-adminsdk-fbsvc@clearthesignal.iam.gserviceaccount.com'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run curation pipeline
        run: node scripts/runPipeline.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
